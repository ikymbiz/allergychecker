name: Deploy static Allergy Checker to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir -p _site
          if [ -f index.html ]; then
            cp index.html _site/index.html
          elif [ -f allergy-checker-ai.zip ]; then
            unzip -o allergy-checker-ai.zip -d _unzipped
            FOUND_INDEX=$(find _unzipped -name index.html | head -n 1)
            if [ -z "$FOUND_INDEX" ]; then
              echo "index.html not found in allergy-checker-ai.zip"
              exit 1
            fi
            cp "$FOUND_INDEX" _site/index.html
          else
            echo "index.html or allergy-checker-ai.zip is required"
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
